<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Modern</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2>🛒 Kasir Japuk</h2>

    <input type="text" id="barcode" placeholder="Scan / input barcode">

    <table>
      <thead>
        <tr>
          <th>Produk</th>
          <th>Qty</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cart"></tbody>
    </table>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h2>Total</h2>

    <h1>Rp <span id="total">0</span></h1>

    <input type="number" id="bayar" placeholder="Uang bayar">

    <button class="btn-bayar" onclick="bayar()">Bayar</button>

    <button onclick="tambahBarang(barcode.value)">Tambah</button>

    <h3 id="kembalian"></h3>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
